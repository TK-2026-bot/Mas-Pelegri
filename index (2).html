<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Hotel Mas Pelegri · Housekeeping</title>

<!-- Firebase (compat build, simplest to use directly in a single HTML file) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
  :root {
    --navy: #0B3D72;
    --navy-soft: #2E6CB8;
    --blue-bg: #EEF4FB;
    --blue-border: #BCD4EC;
    --taupe-bg: #F1F0EC;
    --taupe-border: #D8D5CB;
    --taupe-text: #7A766A;
    --green-bg: #EAF6EE;
    --green-border: #B9E0C3;
    --green-accent: #3FA563;
    --green-text: #2E7D4A;
    --amber-bg: #FCF3E8;
    --amber-border: #F0CFA0;
    --amber-accent: #C98A2E;
    --amber-text: #A6671C;
    --gray-line: #C7CDD6;
    --border: #E2E8F0;
    --muted: #9CB3CC;
    --muted-2: #5C7A9C;
    --bg-page: #F4F6F9;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg-page);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--navy);
  }
  button, input { font-family: inherit; }
  button { cursor: pointer; }

  #app {
    max-width: 420px;
    margin: 0 auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #FFFFFF;
    position: relative;
  }

  /* ---------- top bar ---------- */
  .topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .topbar .brand {
    font-size: 16px;
    font-weight: 600;
    color: var(--navy);
  }
  .role-pill {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid var(--blue-border);
    background: var(--blue-bg);
    color: var(--navy);
    font-weight: 500;
  }
  .role-pill.admin { background: var(--navy); color: #fff; border-color: var(--navy); }

  /* ---------- tabs ---------- */
  .tabs {
    flex-shrink: 0;
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    overflow-x: auto;
  }
  .tab-btn {
    flex: 1;
    padding: 8px 4px;
    font-size: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted-2);
    white-space: nowrap;
  }
  .tab-btn.active {
    border-color: var(--navy-soft);
    background: var(--navy);
    color: #fff;
    font-weight: 500;
  }

  /* ---------- ready banner ---------- */
  .ready-banner {
    flex-shrink: 0;
    margin: 0 14px 10px;
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .ready-banner .label {
    font-size: 10px;
    font-weight: 600;
    color: var(--green-text);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ready-banner .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green-accent);
    display: inline-block;
  }
  .ready-banner .room-row {
    font-size: 13px;
    color: var(--green-text);
    padding: 4px 0;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
  }

  /* ---------- main scroll area ---------- */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 4px 14px 20px;
  }
  .floor-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
    padding-bottom: 8px;
    margin-bottom: 10px;
    border-bottom: 2px solid var(--navy);
  }

  .room-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .room-grid.suites { grid-template-columns: 1fr; }

  .room-card {
    position: relative;
    background: #fff;
    border: 1px solid var(--border);
    border-left: 5px solid var(--gray-line);
    border-radius: 8px;
    padding: 10px 12px;
    min-height: 64px;
    text-align: left;
  }
  .room-card.suite-card { border-left: none; border-top: 5px solid var(--gray-line); }

  .room-card .num { font-size: 17px; font-weight: 600; color: var(--navy); line-height: 1.1; }
  .room-card .name { font-size: 11px; color: var(--muted-2); margin-top: 2px; }
  .room-card .status-label { font-size: 9px; margin-top: 5px; color: var(--muted); }

  .room-card.status-refresh { background: var(--blue-bg); border-left-color: var(--navy-soft); }
  .room-card.status-refresh .name, .room-card.status-refresh .status-label { color: var(--navy-soft); }
  .room-card.suite-card.status-refresh { border-top-color: var(--navy-soft); }

  .room-card.status-full { background: var(--taupe-bg); border-left-color: var(--taupe-text); }
  .room-card.status-full .name, .room-card.status-full .status-label { color: var(--taupe-text); }
  .room-card.suite-card.status-full { border-top-color: var(--taupe-text); }

  .room-card.status-ready { background: var(--green-bg); border-left-color: var(--green-accent); }
  .room-card.status-ready .name, .room-card.status-ready .status-label { color: var(--green-text); }
  .room-card.suite-card.status-ready { border-top-color: var(--green-accent); }

  .service-area {
    background: var(--bg-page);
    border-radius: 8px;
    margin-top: 12px;
    padding: 10px 12px;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
  }

  /* ---------- room panel ---------- */
  .panel-overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    display: flex;
    flex-direction: column;
    z-index: 20;
  }
  .panel-header {
    flex-shrink: 0;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--muted-2);
    background: transparent;
    border: none;
    padding: 0 0 10px;
  }
  .panel-title {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .panel-title .num { font-size: 22px; font-weight: 600; color: var(--navy); }
  .panel-title .name { font-size: 14px; color: var(--muted-2); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }

  .hk-box {
    border-radius: 8px;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .hk-box.refresh { background: var(--blue-bg); border: 1px solid var(--blue-border); border-left: 4px solid var(--navy-soft); }
  .hk-box.full { background: var(--taupe-bg); border: 1px solid var(--taupe-border); border-left: 4px solid var(--taupe-text); }
  .hk-box.ready { background: var(--green-bg); border: 1px solid var(--green-border); border-left: 4px solid var(--green-accent); }
  .hk-box .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; color: var(--navy); margin-bottom: 2px; }
  .hk-box .desc { font-size: 12px; }
  .hk-box.refresh .desc { color: var(--navy-soft); }
  .hk-box.full .desc { color: var(--taupe-text); }
  .hk-box.ready .desc { color: var(--green-text); }

  .pill-btn {
    font-size: 12px;
    padding: 8px 14px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .pill-btn:active { opacity: 0.85; }
  .pill-btn.full-width { width: 100%; padding: 11px; font-size: 14px; }

  .admin-select-row {
    margin-top: 10px;
    display: flex;
    gap: 6px;
  }
  .admin-select-row select {
    flex: 1;
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--blue-border);
    border-radius: 6px;
    background: #fff;
    color: var(--navy);
  }

  .clean-note { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.4; }

  /* ---------- PIN modal ---------- */
  .pin-overlay {
    position: absolute;
    inset: 0;
    background: rgba(11, 61, 114, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .pin-card {
    background: #fff;
    border-radius: 14px;
    padding: 22px 20px;
    width: 100%;
    max-width: 280px;
  }
  .pin-card h3 { margin: 0 0 4px; font-size: 16px; color: var(--navy); }
  .pin-card p { margin: 0 0 14px; font-size: 12px; color: var(--muted-2); }
  .pin-input {
    width: 100%;
    font-size: 22px;
    letter-spacing: 6px;
    text-align: center;
    padding: 10px;
    border: 1px solid var(--blue-border);
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .pin-error { font-size: 11px; color: #B3433F; margin-bottom: 8px; min-height: 14px; }
  .pin-actions { display: flex; gap: 8px; }
  .pin-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; }
  .pin-actions .cancel { background: var(--bg-page); border: 1px solid var(--border); color: var(--muted-2); }
  .pin-actions .confirm { background: var(--navy); border: none; color: #fff; font-weight: 500; }

  /* ---------- footer (admin login) ---------- */
  .bottombar {
    flex-shrink: 0;
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
  }
  .switch-link {
    background: transparent;
    border: none;
    font-size: 12px;
    color: var(--muted-2);
    text-decoration: underline;
  }

  .loading-msg { text-align: center; font-size: 12px; color: var(--muted); padding: 30px 0; }
</style>
</head>
<body>

<div id="app">

  <div class="topbar">
    <span class="brand">Mas Pelegri Hotel</span>
    <span id="rolePill" class="role-pill">Staff view</span>
  </div>

  <div class="tabs" id="tabsRow"></div>

  <div id="readyBannerSlot"></div>

  <div class="main" id="mainArea">
    <div class="loading-msg">Loading…</div>
  </div>

  <div class="bottombar">
    <button class="switch-link" id="switchRoleBtn">Switch to admin mode</button>
  </div>

  <div id="overlaySlot"></div>

</div>

<script>
/* =========================================================
   CONFIG — replace with your own Firebase project settings.
   Get this object from: Firebase console > Project settings
   > General > Your apps > Web app (</>) icon.
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyCDZPd2J1ouu9hjZ6uk_wm4J0Tbyei-sww",
  authDomain: "girona-cycling.firebaseapp.com",
  databaseURL: "https://girona-cycling-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "girona-cycling",
  storageBucket: "girona-cycling.firebasestorage.app",
  messagingSenderId: "889994884558",
  appId: "1:889994884558:web:ecd4c145d826fe5ea6679f"
};

// Simple admin PIN. Change this to whatever you like.
const ADMIN_PIN = "1234";

/* =========================================================
   STATIC HOTEL LAYOUT — matches the real floor plan.
   Edit here if rooms/floors ever change.
   ========================================================= */
const FLOORS = [
  {
    id: "floor1",
    label: "Floor 1",
    rooms: [
      { id: "2", name: "Roccacorba" },
      { id: "1", name: "El Mont" }
    ]
  },
  {
    id: "floor2",
    label: "Floor 2",
    rooms: [
      { id: "7", name: "Horts" },
      { id: "8", name: "Centenys" },
      { id: "6", name: "Vallter" },
      { id: "5", name: "D'Anes" }
    ]
  },
  {
    id: "floor3",
    label: "Floor 3",
    rooms: [
      { id: "13", name: "Els Angles" },
      { id: "14", name: "Salvador" },
      { id: "15", name: "Cabsacosta" },
      { id: "12", name: "Bracons" },
      { id: "11", name: "Gavarres" }
    ]
  },
  {
    id: "suites",
    label: "Suites",
    isSuite: true,
    rooms: [
      { id: "s6", name: "Suite 6" },
      { id: "s5", name: "Suite 5" },
      { id: "s4", name: "Suite 4" },
      { id: "s3", name: "Suite 3" },
      { id: "s2", name: "Suite 2" },
      { id: "s1", name: "Suite 1" }
    ]
  }
];

// Flat lookup: roomKey -> {floorId, floorLabel, name}
const ROOM_INDEX = {};
FLOORS.forEach(f => {
  f.rooms.forEach(r => {
    ROOM_INDEX[r.id] = { floorId: f.id, floorLabel: f.label, name: r.name, isSuite: !!f.isSuite };
  });
});

/* =========================================================
   STATE
   ========================================================= */
let isAdmin = false;
let activeFloor = "floor1";
let roomStatuses = {}; // roomId -> "none" | "refresh" | "full" | "ready"
let dbReady = false;

const STATUS_LABEL = {
  none: "Clean",
  refresh: "Refresh clean needed",
  full: "Full clean needed",
  ready: "Ready for check"
};

/* =========================================================
   FIREBASE INIT
   ========================================================= */
let db;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  db.ref("housekeeping").on("value", (snap) => {
    roomStatuses = snap.val() || {};
    dbReady = true;
    render();
  }, (err) => {
    console.error("Firebase read failed:", err);
    document.getElementById("mainArea").innerHTML =
      '<div class="loading-msg">Can\'t connect to the database.<br>Check Realtime Database rules in Firebase console<br>(Build &gt; Realtime Database &gt; Rules) — they should allow read/write for now.<br><br>Error: ' + (err.message || err) + '</div>';
  });
} catch (e) {
  console.error("Firebase init failed — check firebaseConfig.", e);
  document.getElementById("mainArea").innerHTML =
    '<div class="loading-msg">Firebase is not configured yet.<br>Edit firebaseConfig in the code.</div>';
}

function setRoomStatus(roomId, status) {
  if (!db) return;
  db.ref("housekeeping/" + roomId).set(status);
}

/* =========================================================
   RENDER: tabs
   ========================================================= */
function renderTabs() {
  const row = document.getElementById("tabsRow");
  row.innerHTML = "";
  FLOORS.forEach(f => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (f.id === activeFloor ? " active" : "");
    btn.textContent = f.label;
    btn.onclick = () => { activeFloor = f.id; render(); };
    row.appendChild(btn);
  });
}

/* =========================================================
   RENDER: ready-for-check banner
   ========================================================= */
function renderReadyBanner() {
  const slot = document.getElementById("readyBannerSlot");
  if (!isAdmin) { slot.innerHTML = ""; return; }

  const readyRooms = Object.keys(roomStatuses).filter(id => roomStatuses[id] === "ready" && ROOM_INDEX[id]);
  if (readyRooms.length === 0) { slot.innerHTML = ""; return; }

  let html = '<div class="ready-banner"><div class="label"><span class="dot"></span>Ready for check</div>';
  readyRooms.forEach(id => {
    const info = ROOM_INDEX[id];
    const displayNum = info.isSuite ? id.replace("s", "") : id;
    html += `<div class="room-row" data-room="${id}">${displayNum} · ${info.name}<span>${info.floorLabel}</span></div>`;
  });
  html += "</div>";
  slot.innerHTML = html;

  slot.querySelectorAll(".room-row").forEach(row => {
    row.onclick = () => openRoomPanel(row.dataset.room);
  });
}

/* =========================================================
   RENDER: floor grid
   ========================================================= */
function statusClass(status) {
  if (status === "refresh") return "status-refresh";
  if (status === "full") return "status-full";
  if (status === "ready") return "status-ready";
  return "";
}

function renderMain() {
  const main = document.getElementById("mainArea");
  if (!dbReady) {
    main.innerHTML = '<div class="loading-msg">Loading…</div>';
    return;
  }

  const floor = FLOORS.find(f => f.id === activeFloor);
  let html = `<div class="floor-title">${floor.label}</div>`;
  html += `<div class="room-grid${floor.isSuite ? " suites" : ""}">`;

  floor.rooms.forEach(r => {
    const status = roomStatuses[r.id] || "none";
    const cls = statusClass(status);
    const displayNum = floor.isSuite ? r.id.replace("s", "") : r.id;
    html += `
      <button class="room-card${floor.isSuite ? " suite-card" : ""} ${cls}" data-room="${r.id}">
        <div class="num">${displayNum.padStart(2, "0")}</div>
        <div class="name">${r.name}</div>
        ${status !== "none" ? `<div class="status-label">${STATUS_LABEL[status]}</div>` : ""}
      </button>`;
  });

  html += "</div>";

  if (floor.id === "floor2") {
    html += `<div class="service-area">kitchen · not a guest room</div>`;
  }
  if (floor.id === "floor3") {
    html += `<div class="service-area">10 · massage room · not a guest room</div>`;
  }

  main.innerHTML = html;

  main.querySelectorAll(".room-card").forEach(card => {
    card.onclick = () => openRoomPanel(card.dataset.room);
  });
}

/* =========================================================
   ROOM PANEL (overlay)
   ========================================================= */
function openRoomPanel(roomId) {
  const info = ROOM_INDEX[roomId];
  if (!info) return;
  const status = roomStatuses[roomId] || "none";
  const displayNum = info.isSuite ? roomId.replace("s", "") : roomId;

  let hkBlock = "";

  if (isAdmin) {
    // Admin: can set the cleaning type, and Accept when status is "ready"
    if (status === "ready") {
      hkBlock = `
        <div class="hk-box ready">
          <div>
            <div class="label">Housekeeping</div>
            <div class="desc">Ready for check</div>
          </div>
          <button class="pill-btn" id="acceptBtn">Accept</button>
        </div>`;
    } else {
      hkBlock = `
        <div class="hk-box ${status === "refresh" ? "refresh" : status === "full" ? "full" : ""}" style="${status === "none" ? "background:#F7F8FA;border:1px solid var(--border);border-left:4px solid var(--gray-line);" : ""}">
          <div style="flex:1;">
            <div class="label">Housekeeping</div>
            <div class="desc" style="color:var(--muted-2);">${STATUS_LABEL[status]}</div>
            <div class="admin-select-row">
              <select id="cleanSelect">
                <option value="none" ${status === "none" ? "selected" : ""}>No cleaning needed</option>
                <option value="refresh" ${status === "refresh" ? "selected" : ""}>Refresh clean</option>
                <option value="full" ${status === "full" ? "selected" : ""}>Full clean</option>
              </select>
            </div>
          </div>
        </div>`;
    }
  } else {
    // Housemaid: read-only status, only a Done button when cleaning is assigned
    if (status === "refresh" || status === "full") {
      hkBlock = `
        <div class="hk-box ${status === "refresh" ? "refresh" : "full"}">
          <div style="width:100%;">
            <div class="label">Housekeeping</div>
            <div class="desc" style="margin-bottom:12px;">${STATUS_LABEL[status]}</div>
            <button class="pill-btn full-width" id="doneBtn">Done — ready for check</button>
          </div>
        </div>
        <div class="clean-note">The room stays marked until you tap Done. No other action needed from you.</div>`;
    } else if (status === "ready") {
      hkBlock = `
        <div class="hk-box ready">
          <div>
            <div class="label">Housekeeping</div>
            <div class="desc">Already marked ready — waiting for admin check.</div>
          </div>
        </div>`;
    } else {
      hkBlock = `<div class="clean-note">This room doesn't need cleaning right now.</div>`;
    }
  }

  const overlay = document.createElement("div");
  overlay.className = "panel-overlay";
  overlay.innerHTML = `
    <div class="panel-header">
      <button class="back-btn" id="panelBack"><span style="font-size:14px;">&larr;</span> Floor plan</button>
      <div class="panel-title">
        <span class="num">${displayNum.padStart(2, "0")}</span>
        <span class="name">${info.name}</span>
      </div>
    </div>
    <div class="panel-body">
      ${hkBlock}
    </div>
  `;
  document.getElementById("overlaySlot").appendChild(overlay);

  overlay.querySelector("#panelBack").onclick = () => overlay.remove();

  const acceptBtn = overlay.querySelector("#acceptBtn");
  if (acceptBtn) acceptBtn.onclick = () => { setRoomStatus(roomId, "none"); overlay.remove(); };

  const doneBtn = overlay.querySelector("#doneBtn");
  if (doneBtn) doneBtn.onclick = () => { setRoomStatus(roomId, "ready"); overlay.remove(); };

  const cleanSelect = overlay.querySelector("#cleanSelect");
  if (cleanSelect) cleanSelect.onchange = () => { setRoomStatus(roomId, cleanSelect.value); };
}

/* =========================================================
   ADMIN PIN FLOW
   ========================================================= */
function showPinModal() {
  const overlay = document.createElement("div");
  overlay.className = "pin-overlay";
  overlay.innerHTML = `
    <div class="pin-card">
      <h3>Admin mode</h3>
      <p>Enter the PIN to access pricing and billing controls.</p>
      <input type="password" inputmode="numeric" maxlength="4" class="pin-input" id="pinInput" autofocus />
      <div class="pin-error" id="pinError"></div>
      <div class="pin-actions">
        <button class="cancel" id="pinCancel">Cancel</button>
        <button class="confirm" id="pinConfirm">Unlock</button>
      </div>
    </div>
  `;
  document.getElementById("overlaySlot").appendChild(overlay);

  const input = overlay.querySelector("#pinInput");
  const error = overlay.querySelector("#pinError");

  overlay.querySelector("#pinCancel").onclick = () => overlay.remove();
  overlay.querySelector("#pinConfirm").onclick = tryUnlock;
  input.onkeydown = (e) => { if (e.key === "Enter") tryUnlock(); };

  function tryUnlock() {
    if (input.value === ADMIN_PIN) {
      isAdmin = true;
      sessionStorage.setItem("isAdmin", "1");
      overlay.remove();
      render();
    } else {
      error.textContent = "Incorrect PIN, try again.";
      input.value = "";
    }
  }
}

document.getElementById("switchRoleBtn").onclick = () => {
  if (isAdmin) {
    isAdmin = false;
    sessionStorage.removeItem("isAdmin");
    render();
  } else {
    showPinModal();
  }
};

// Restore admin session within the same tab (cleared on close/reload).
if (sessionStorage.getItem("isAdmin") === "1") {
  isAdmin = true;
}

/* =========================================================
   MASTER RENDER
   ========================================================= */
function render() {
  document.getElementById("rolePill").textContent = isAdmin ? "Admin mode" : "Staff view";
  document.getElementById("rolePill").className = "role-pill" + (isAdmin ? " admin" : "");
  document.getElementById("switchRoleBtn").textContent = isAdmin ? "Switch to staff view" : "Switch to admin mode";
  renderTabs();
  renderReadyBanner();
  renderMain();
}

render();
</script>

</body>
</html>
