<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Hotel Mas Pelegri · Housekeeping</title>

<link rel="apple-touch-icon" href="icon-180.png" />

<!-- Firebase (compat build, simplest to use directly in a single HTML file) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<style>
  :root {
    --navy: #0B3D72;
    --navy-soft: #2E6CB8;
    --blue-bg: #EEF4FB;
    --blue-border: #BCD4EC;
    --taupe-bg: #F1F0EC;
    --taupe-border: #D8D5CB;
    --taupe-text: #7A766A;
    --pink-bg: #FDF0F3;
    --pink-border: #F0C0CC;
    --pink-accent: #C4607A;
    --green-ready-refresh-bg: #F0FAF3;
    --green-ready-refresh-border: #B8E0C4;
    --green-ready-refresh-accent: #8BC9A0;
    --green-ready-midweek-bg: #D6F0DF;
    --green-ready-midweek-border: #90D4A8;
    --green-ready-midweek-accent: #4DA870;
    --green-ready-full-bg: #EAF6EE;
    --green-ready-full-border: #B9E0C3;
    --green-ready-full-accent: #3FA563;
    --green-bg: #EAF6EE;
    --green-border: #B9E0C3;
    --green-accent: #3FA563;
    --green-text: #2E7D4A;
    --amber-bg: #FCF3E8;
    --amber-border: #F0CFA0;
    --amber-accent: #C98A2E;
    --amber-text: #A6671C;
    --gray-line: #C7CDD6;
    --border: #E2E8F0;
    --muted: #9CB3CC;
    --muted-2: #5C7A9C;
    --bg-page: #F4F6F9;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg-page);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--navy);
  }
  button, input { font-family: inherit; }
  button { cursor: pointer; }

  #app {
    max-width: 420px;
    margin: 0 auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #FFFFFF;
    position: relative;
  }

  /* ---------- top bar ---------- */
  .topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .topbar .brand {
    font-size: 24px;
    font-weight: 600;
    color: var(--navy);
  }
  .role-pill {
    font-size: 23px;
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid var(--blue-border);
    background: var(--blue-bg);
    color: var(--navy);
    font-weight: 500;
  }
  .role-pill.admin { background: var(--navy); color: #fff; border-color: var(--navy); }

  /* ---------- tabs ---------- */
  .tabs {
    flex-shrink: 0;
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    overflow-x: auto;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 4px;
    font-size: 17px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted-2);
    white-space: nowrap;
  }
  .tab-btn.active {
    border-color: var(--navy-soft);
    background: var(--navy);
    color: #fff;
    font-weight: 500;
  }

  /* ---------- ready banner ---------- */
  .ready-banner {
    flex-shrink: 0;
    margin: 0 14px 10px;
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .ready-banner .label {
    font-size: 17px;
    font-weight: 600;
    color: var(--green-text);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ready-banner .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green-accent);
    display: inline-block;
  }
  .ready-banner .room-row {
    padding: 6px 0;
    cursor: pointer;
  }
  .ready-banner .room-row .main-line {
    font-size: 19px;
    color: var(--green-text);
    font-weight: 500;
  }
  .ready-banner .room-row .sub-line {
    font-size: 14px;
    color: var(--green-text);
    opacity: 0.8;
  }

  /* ---------- main scroll area ---------- */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 4px 14px 20px;
  }
  .floor-title {
    font-size: 23px;
    font-weight: 600;
    color: var(--navy);
    padding-bottom: 8px;
    margin-bottom: 10px;
    border-bottom: 2px solid var(--navy);
  }

  .room-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .room-grid.suites { grid-template-columns: 1fr; }

  .room-card {
    position: relative;
    background: #fff;
    border: 1px solid var(--border);
    border-left: 5px solid var(--gray-line);
    border-radius: 8px;
    padding: 16px 14px;
    min-height: 88px;
    text-align: left;
  }
  .room-card.suite-card { border-left: none; border-top: 5px solid var(--gray-line); }

  .room-card .num { font-size: 28px; font-weight: 600; color: var(--navy); line-height: 1.1; }
  .room-card .name { font-size: 16px; color: var(--muted-2); margin-top: 3px; }
  .room-card .status-label { font-size: 14px; margin-top: 6px; color: var(--muted); }

  .room-card.status-refresh { background: var(--blue-bg); border-left-color: var(--navy-soft); }
  .room-card.status-refresh .name, .room-card.status-refresh .status-label { color: var(--navy-soft); }
  .room-card.suite-card.status-refresh { border-top-color: var(--navy-soft); }

  .room-card.status-midweek { background: var(--pink-bg); border-left-color: var(--pink-accent); }
  .room-card.status-midweek .name, .room-card.status-midweek .status-label { color: var(--pink-accent); }
  .room-card.suite-card.status-midweek { border-top-color: var(--pink-accent); }

  .room-card.status-full { background: var(--taupe-bg); border-left-color: var(--taupe-text); }
  .room-card.status-full .name, .room-card.status-full .status-label { color: var(--taupe-text); }
  .room-card.suite-card.status-full { border-top-color: var(--taupe-text); }

  .room-card.status-ready-refresh { background: var(--green-ready-refresh-bg); border-left-color: var(--green-ready-refresh-accent); }
  .room-card.status-ready-refresh .name, .room-card.status-ready-refresh .status-label { color: var(--green-ready-refresh-accent); }
  .room-card.suite-card.status-ready-refresh { border-top-color: var(--green-ready-refresh-accent); }

  .room-card.status-ready-midweek { background: var(--green-ready-midweek-bg); border-left-color: var(--green-ready-midweek-accent); }
  .room-card.status-ready-midweek .name, .room-card.status-ready-midweek .status-label { color: var(--green-ready-midweek-accent); }
  .room-card.suite-card.status-ready-midweek { border-top-color: var(--green-ready-midweek-accent); }

  .room-card.status-ready-full { background: var(--green-ready-full-bg); border-left-color: var(--green-ready-full-accent); }
  .room-card.status-ready-full .name, .room-card.status-ready-full .status-label { color: var(--green-ready-full-accent); }
  .room-card.suite-card.status-ready-full { border-top-color: var(--green-ready-full-accent); }

  /* legacy — keep for backward compat */
  .room-card.status-ready { background: var(--green-ready-full-bg); border-left-color: var(--green-ready-full-accent); }
  .room-card.status-ready .name, .room-card.status-ready .status-label { color: var(--green-ready-full-accent); }
  .room-card.suite-card.status-ready { border-top-color: var(--green-ready-full-accent); }

  .service-area {
    background: var(--bg-page);
    border-radius: 8px;
    margin-top: 12px;
    padding: 12px;
    font-size: 17px;
    color: var(--muted);
    text-align: center;
  }

  /* ---------- room panel ---------- */
  .panel-overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    display: flex;
    flex-direction: column;
    z-index: 20;
    padding-top: env(safe-area-inset-top, 0px);
  }
  .panel-header {
    flex-shrink: 0;
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 23px;
    color: var(--muted-2);
    background: transparent;
    border: none;
    padding: 8px 4px 14px 0;
    margin: -8px 0 0 -4px;
  }
  .panel-title {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .panel-title .num { font-size: 32px; font-weight: 600; color: var(--navy); }
  .panel-title .name { font-size: 23px; color: var(--muted-2); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .hk-box {
    border-radius: 8px;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .hk-box.refresh { background: var(--blue-bg); border: 1px solid var(--blue-border); border-left: 4px solid var(--navy-soft); }
  .hk-box.midweek { background: var(--pink-bg); border: 1px solid var(--pink-border); border-left: 4px solid var(--pink-accent); }
  .hk-box.full { background: var(--taupe-bg); border: 1px solid var(--taupe-border); border-left: 4px solid var(--taupe-text); }
  .hk-box.ready { background: var(--green-bg); border: 1px solid var(--green-border); border-left: 4px solid var(--green-accent); }
  .hk-box .label { font-size: 21px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; color: var(--navy); margin-bottom: 3px; }
  .hk-box .desc { font-size: 23px; }
  .hk-box.refresh .desc { color: var(--navy-soft); }
  .hk-box.midweek .desc { color: var(--pink-accent); }
  .hk-box.full .desc { color: var(--taupe-text); }
  .hk-box.ready .desc { color: var(--green-text); }
  .by-line { font-size: 14px; color: var(--green-text); opacity: 0.85; margin-top: 4px; }

  .pill-btn {
    font-size: 21px;
    padding: 8px 14px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .pill-btn:active { opacity: 0.85; }
  .pill-btn.full-width { width: 100%; padding: 11px; font-size: 23px; }

  .admin-select-row {
    margin-top: 10px;
    display: flex;
    gap: 6px;
  }
  .admin-select-row select {
    flex: 1;
    font-size: 25px;
    padding: 8px 10px;
    border: 1px solid var(--blue-border);
    border-radius: 6px;
    background: #fff;
    color: var(--navy);
  }

  .clean-note { font-size: 23px; color: var(--muted-2); margin-top: 10px; line-height: 1.5; }

  .clean-card {
    background: var(--bg-page);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gray-line);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .clean-card .check-icon {
    width: 22px; height: 22px; flex-shrink: 0;
    border-radius: 50%;
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    display: flex; align-items: center; justify-content: center;
    color: var(--green-accent);
    font-size: 14px;
  }
  .clean-card .text { font-size: 17px; color: var(--muted-2); }

  /* ---------- PIN modal ---------- */
  .pin-overlay {
    position: absolute;
    inset: 0;
    background: rgba(11, 61, 114, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .pin-card {
    background: #fff;
    border-radius: 14px;
    padding: 22px 20px;
    width: 100%;
    max-width: 280px;
  }
  .pin-card h3 { margin: 0 0 4px; font-size: 24px; color: var(--navy); }
  .pin-card p { margin: 0 0 14px; font-size: 21px; color: var(--muted-2); }
  .pin-input {
    width: 100%;
    font-size: 32px;
    letter-spacing: 6px;
    text-align: center;
    padding: 10px;
    border: 1px solid var(--blue-border);
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .pin-error { font-size: 23px; color: #B3433F; margin-bottom: 8px; min-height: 14px; }
  .pin-actions { display: flex; gap: 8px; }
  .pin-actions button { flex: 1; padding: 10px; border-radius: 8px; font-size: 25px; }
  .pin-actions .cancel { background: var(--bg-page); border: 1px solid var(--border); color: var(--muted-2); }
  .pin-actions .confirm { background: var(--navy); border: none; color: #fff; font-weight: 500; }

  /* ---------- footer (admin login) ---------- */
  .bottombar {
    flex-shrink: 0;
    padding: 14px 16px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
  }
  .switch-link {
    background: transparent;
    border: none;
    font-size: 23px;
    color: var(--muted-2);
    text-decoration: underline;
    padding: 4px;
  }

  .loading-msg { text-align: center; font-size: 21px; color: var(--muted); padding: 30px 0; }

  /* ---------- extras dots on room cards ---------- */
  .extras-dots {
    position: absolute;
    top: 8px; right: 10px;
    display: flex; gap: 3px;
  }
  .extras-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--amber-accent);
    display: inline-block;
  }

  /* ---------- extras panel section ---------- */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted-2);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 18px 0 8px;
  }

  .extras-col-headers {
    display: grid;
    grid-template-columns: 1fr 50px 58px 70px 28px;
    gap: 4px;
    font-size: 12px;
    color: var(--muted);
    padding: 0 12px 4px;
  }
  .extras-col-headers span:nth-child(2),
  .extras-col-headers span:nth-child(3),
  .extras-col-headers span:nth-child(4) { text-align: right; }

  .extra-row {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    display: grid;
    grid-template-columns: 1fr 50px 58px 70px 28px;
    align-items: center;
    gap: 4px;
    margin-bottom: 6px;
  }
  .extra-row .svc-name { font-size: 15px; color: var(--navy); }
  .extra-row .svc-unit { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .extra-row input[type="number"] {
    width: 100%;
    text-align: right;
    font-size: 14px;
    padding: 5px 4px;
    border: 1px solid var(--blue-border);
    border-radius: 6px;
    color: var(--navy);
  }
  .extra-row .total-val {
    font-size: 15px;
    text-align: right;
    color: var(--navy);
    font-weight: 500;
  }
  .extra-row .total-val.zero { color: var(--muted); font-weight: 400; }

  .custom-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }
  .custom-row input[type="text"] {
    flex: 1;
    font-size: 14px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .custom-row input[type="number"] {
    width: 62px;
    font-size: 14px;
    padding: 8px 4px;
    text-align: right;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .custom-row button {
    width: 38px; padding: 0;
    flex-shrink: 0;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 20px;
  }

  .grand-total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 0 4px;
    border-top: 2px solid var(--navy);
    margin-top: 4px;
  }
  .grand-total-row .label { font-size: 16px; font-weight: 600; color: var(--navy); }
  .grand-total-row .amount { font-size: 21px; font-weight: 600; color: var(--navy); }

  /* ---------- panel sticky footer (mark as billed) ---------- */
  .panel-footer {
    flex-shrink: 0;
    padding: 12px 16px 18px;
    border-top: 1px solid var(--border);
    background: #fff;
  }

  /* ---------- catalog (admin) ---------- */
  .catalog-row {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .catalog-row .pop-badge {
    font-size: 10px;
    font-weight: 600;
    color: var(--navy-soft);
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    border-radius: 4px;
    padding: 2px 6px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .catalog-row .spacer { width: 46px; flex-shrink: 0; }
  .catalog-row input[type="text"] {
    flex: 1;
    font-size: 15px;
    border: none;
    padding: 2px 0;
    background: transparent;
    color: var(--navy);
  }
  .catalog-row .price-wrap {
    display: flex;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }
  .catalog-row .price-wrap span { font-size: 13px; color: var(--muted); }
  .catalog-row .price-wrap input {
    width: 56px;
    text-align: right;
    font-size: 14px;
    padding: 5px 4px;
    border: 1px solid var(--blue-border);
    border-radius: 6px;
    color: var(--navy);
  }
  .catalog-row .hide-btn {
    width: 32px; height: 32px;
    padding: 0; flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 16px;
    color: var(--muted);
  }
  .catalog-row.hidden-item { opacity: 0.55; }
  .catalog-row.hidden-item .svc-label { text-decoration: line-through; color: var(--muted); }
  .catalog-row .hide-btn.show-btn { background: var(--blue-bg); border-color: var(--blue-border); color: var(--navy-soft); }

  .add-catalog-row {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .add-catalog-row input[type="text"] {
    flex: 1;
    font-size: 14px;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .add-catalog-row .price-wrap { display: flex; align-items: center; gap: 2px; }
  .add-catalog-row .price-wrap span { font-size: 13px; color: var(--muted); }
  .add-catalog-row .price-wrap input {
    width: 60px;
    text-align: right;
    font-size: 14px;
    padding: 9px 4px;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .add-catalog-row button {
    width: 38px; padding: 0;
    background: var(--navy); color: #fff;
    border: none; border-radius: 6px; font-size: 20px;
  }

  .billed-note { font-size: 13px; color: var(--muted); margin: 8px 0 0; line-height: 1.4; text-align: center; }
</style>
</head>

<div id="app">

  <div class="topbar">
    <span class="brand">Mas Pelegri Hotel</span>

  <div class="tabs" id="tabsRow"></div>

  <div id="readyBannerSlot"></div>

  <div class="main" id="mainArea">

  <div class="bottombar">
    <button class="switch-link" id="switchRoleBtn">Switch to admin mode</button>
  </div>

  <div id="overlaySlot"></div>

</div>

const ROOM_INDEX = {};

/* =========================================================
   STATE
   ========================================================= */
let isAdmin = false;
let activeFloor = "floor1";
let activeSection = "floors"; // "floors" | "catalog"
let roomStatuses = {};
let roomExtras = {};   // roomId -> {svcId: {qty, total}, custom_N: {name, qty, total}, billed: bool}
let catalog = {};      // svcId -> {name, price, hidden, usageCount: {YYYY-MM: N}}
let dbReady = false;
let extrasReady = false;
let catalogReady = false;
let staffName = localStorage.getItem("staffName") || "";

const STATUS_LABEL = {
  none: "Clean",
  refresh: "Refresh clean needed",
  midweek: "Midweek clean needed",
  full: "Full clean needed",
  "ready-refresh": "Ready · Refresh",
  "ready-midweek": "Ready · Midweek",
  "ready-full": "Ready · Full clean",
  ready: "Ready for check"
};

// Reads a room's status whether it's stored as a plain string (legacy)
// or as an object {status, by, at} (with staff name attached).
function getRoomStatus(roomId) {
  const v = roomStatuses[roomId];
  if (!v) return "none";
  if (typeof v === "string") return v;
  return v.status || "none";
}
function getCleanType(roomId) {
  const v = roomStatuses[roomId];
  if (!v || typeof v === "string") return null;
  return v.cleanType || null;
}
function getRoomMeta(roomId) {
  const v = roomStatuses[roomId];
  if (v && typeof v === "object") return v;
  return null;
}

function getOrAskStaffName() {
  if (staffName) return staffName;
  const input = prompt("What's your name? (only asked once on this device)");
  if (!input || !input.trim()) return null;
  staffName = input.trim();
  localStorage.setItem("staffName", staffName);
  return staffName;
}

function formatTime(isoString) {
  try {
    const d = new Date(isoString);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  } catch (e) {
    return "";
  }
}

/* =========================================================
   FIREBASE INIT
   ========================================================= */
let db;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();

  db.ref("housekeeping").on("value", (snap) => {
    roomStatuses = snap.val() || {};
    dbReady = true;
    if (extrasReady && catalogReady) render();
  }, (err) => {
    console.error("Firebase housekeeping read failed:", err);
    document.getElementById("mainArea").innerHTML =
      '<div class="loading-msg">Can\'t read from database.<br>Check Realtime Database rules (Build → Realtime Database → Rules).<br><br>' + (err.message || err) + '</div>';
  });

  db.ref("extras").on("value", (snap) => {
    roomExtras = snap.val() || {};
    extrasReady = true;
    if (dbReady && catalogReady) render();
  });

  db.ref("catalog").on("value", (snap) => {
    catalog = snap.val() || {};
    catalogReady = true;
    if (dbReady && extrasReady) render();
  });
} catch (e) {
  console.error("Firebase init failed — check firebaseConfig.", e);
  document.getElementById("mainArea").innerHTML =
    '<div class="loading-msg">Firebase is not configured yet.<br>Edit firebaseConfig in the code.</div>';
}

function setRoomStatus(roomId, status, byName, fromStatus) {
  if (!db) return;
  if (status === "ready" && byName) {
    // Determine ready sub-type from the clean type that was done
    const readyType = fromStatus === "refresh" ? "ready-refresh"
                    : fromStatus === "midweek"  ? "ready-midweek"
                    : fromStatus === "full"      ? "ready-full"
                    : "ready";
    db.ref("housekeeping/" + roomId).set({
      status: readyType,
      cleanType: fromStatus || "full",
      by: byName,
      at: new Date().toISOString()
    });
  } else {
    db.ref("housekeeping/" + roomId).set(status);
  }
}

/* =========================================================
   EXTRAS HELPERS
   ========================================================= */
function roomHasExtras(roomId) {
  const ex = roomExtras[roomId];
  if (!ex || ex.billed) return false;
  return Object.keys(ex).some(k => k !== "billed" && ex[k] && (ex[k].qty || 0) > 0);
}

function setExtra(roomId, key, data) {
  if (!db) return;
  db.ref("extras/" + roomId + "/" + key).set(data);
}

function markBilled(roomId) {
  if (!db) return;
  // Update usage counts in catalog for this room's services
  const ex = roomExtras[roomId] || {};
  const monthKey = new Date().toISOString().slice(0, 7); // YYYY-MM
  Object.keys(ex).forEach(k => {
    if (k !== "billed" && !k.startsWith("custom_") && ex[k] && ex[k].qty > 0) {
      db.ref("catalog/" + k + "/usageCount/" + monthKey).transaction(v => (v || 0) + 1);
    }
  });
  // Clear the entire extras list for this room — ready for the next guest
  db.ref("extras/" + roomId).remove();
  if (roomExtras[roomId]) delete roomExtras[roomId];
}

function resetExtras(roomId) {
  if (!db) return;
  db.ref("extras/" + roomId).remove();
}

/* =========================================================
   CATALOG HELPERS
   ========================================================= */
function getSortedCatalog() {
  const now = new Date();
  const months = [];
  for (let i = 0; i < 2; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(d.toISOString().slice(0, 7));
  }
  return Object.entries(catalog).map(([id, svc]) => {
    const count = months.reduce((sum, m) => sum + ((svc.usageCount || {})[m] || 0), 0);
    return { id, ...svc, recentUse: count };
  }).sort((a, b) => b.recentUse - a.recentUse);
}

function addCatalogItem(name, price) {
  if (!db || !name.trim()) return;
  const id = "svc_" + Date.now();
  db.ref("catalog/" + id).set({ name: name.trim(), price: parseFloat(price) || 0, hidden: false });
}

function updateCatalogItem(id, field, value) {
  if (!db) return;
  db.ref("catalog/" + id + "/" + field).set(value);
}

function toggleCatalogHidden(id, currentlyHidden) {
  if (!db) return;
  db.ref("catalog/" + id + "/hidden").set(!currentlyHidden);
}
function renderTabs() {
  const row = document.getElementById("tabsRow");

    btn.textContent = f.label;
    btn.onclick = () => { activeSection = "floors"; activeFloor = f.id; render(); };
    row.appendChild(btn);

    btn.textContent = "Services";
    btn.onclick = () => { activeSection = "catalog"; render(); };

}

/* =========================================================
   RENDER: ready-for-check banner
   ========================================================= */
function renderReadyBanner() {
  const slot = document.getElementById("readyBannerSlot");
  if (!isAdmin) { slot.innerHTML = ""; return; }

  const readyRooms = Object.keys(roomStatuses).filter(id => {
    const s = getRoomStatus(id);
    return (s === "ready" || s === "ready-refresh" || s === "ready-midweek" || s === "ready-full") && ROOM_INDEX[id];
  });
  if (readyRooms.length === 0) { slot.innerHTML = ""; return; }

  let html = '<div class="ready-banner"><div class="label">Ready for check</div>';
  readyRooms.forEach(id => {
    const info = ROOM_INDEX[id];
    const meta = getRoomMeta(id);
    const displayNum = info.isSuite ? id.replace("s", "") : id;
    const byText = meta && meta.by ? ` · by ${meta.by}` : "";
    const s = getRoomStatus(id);
    const cleanLabel = s === "ready-refresh" ? "Refresh"
                     : s === "ready-midweek"  ? "Midweek"
                     : s === "ready-full"     ? "Full clean"
                     : "";
    const dotColor = s === "ready-refresh" ? "#8BC9A0"
                   : s === "ready-midweek"  ? "#4DA870"
                   : "#3FA563";
    html += `<div class="room-row" data-room="${id}">
      <div class="main-line" style="display:flex;align-items:center;gap:8px;">
        <span style="width:10px;height:10px;border-radius:50%;background:${dotColor};display:inline-block;flex-shrink:0;"></span>
        ${displayNum} · ${info.name}
        ${cleanLabel ? `<span style="font-size:13px;opacity:0.8;">(${cleanLabel})</span>` : ""}
      </div>
      <div class="sub-line">${info.floorLabel}${byText}</div>
    </div>`;
  });
  html += "</div>";
  slot.innerHTML = html;

  slot.querySelectorAll(".room-row").forEach(row => {
    row.onclick = () => openRoomPanel(row.dataset.room);
  });
}

function statusClass(status) {

  if (status === "ready-refresh") return "status-ready-refresh";

/* =========================================================

function roomFill(id) {
  const s = getRoomStatus(id);
  if (s === "ready-refresh") return { bg: "#F0FAF3", border: "#B8E0C4", stripe: "#8BC9A0" };
  if (s === "ready-midweek") return { bg: "#D6F0DF", border: "#90D4A8", stripe: "#4DA870" };
  if (s === "ready-full")    return { bg: "#EAF6EE", border: "#B9E0C3", stripe: "#3FA563" };
  if (s === "ready")         return { bg: "#EAF6EE", border: "#B9E0C3", stripe: "#3FA563" };
  if (s === "refresh")       return { bg: "#EEF4FB", border: "#BCD4EC", stripe: "#2E6CB8" };
  if (s === "midweek")       return { bg: "#FDF0F3", border: "#F0C0CC", stripe: "#C4607A" };
  if (s === "full")          return { bg: "#F1F0EC", border: "#D8D5CB", stripe: "#8A8676" };
  return { bg: "#FFFFFF", border: "#E2E8F0", stripe: "#C7CDD6" };
}

function roomDotsHtml(id) {
  if (!roomHasExtras(id)) return "";
  return `<circle cx="-10" cy="-10" r="3" fill="#A8631C"/>
          <circle cx="-3"  cy="-10" r="3" fill="#A8631C"/>
          <circle cx="4"   cy="-10" r="3" fill="#A8631C"/>`;
}

function makeRoom(id, x, y, w, h, numX, numY, nameX, nameY, name2, nameOverride) {
  const f = roomFill(id);
  const info = ROOM_INDEX[id];
  const displayNum = info.isSuite ? id.replace("s","") : id;
  const name = nameOverride || (info ? info.name : "");
  const hasExtras = roomHasExtras(id);
  const dx = x + w - 30;
  const dy = y + 12;
  const nameLine2 = name2 ? `<text x="${nameX}" y="${nameY+14}" font-size="12" fill="#5C7A9C"
    font-family="system-ui,sans-serif">${name2}</text>` : "";
  return `
  <g class="room-btn" data-room="${id}" style="cursor:pointer;">
    <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6"
      fill="${f.bg}" stroke="${f.border}" stroke-width="1"/>
    <rect x="${x}" y="${y}" width="5" height="${h}" rx="2" fill="${f.stripe}"/>
    <text x="${numX}" y="${numY}" font-size="18" font-weight="600"
      fill="#0B3D72" font-family="system-ui,sans-serif">${displayNum.padStart(2,"0")}</text>
    <text x="${nameX}" y="${nameY}" font-size="12" fill="#5C7A9C"
      font-family="system-ui,sans-serif">${name}</text>
    ${nameLine2}

    <circle cx="${dx+20}" cy="${dy}" r="3.5" fill="#A8631C"/>` : ""}

}

function makeService(x, y, w, h, label) {
  const parts = label.split("\\n");
  const cy = y + h/2;
  const textNodes = parts.length > 1
    ? `<text x="${x+w/2}" y="${cy-2}" text-anchor="middle" font-size="11" fill="#9CB3CC" font-family="system-ui,sans-serif">${parts[0]}</text>
       <text x="${x+w/2}" y="${cy+12}" text-anchor="middle" font-size="11" fill="#9CB3CC" font-family="system-ui,sans-serif">${parts[1]}</text>`
    : `<text x="${x+w/2}" y="${cy+4}" text-anchor="middle" font-size="11" fill="#9CB3CC" font-family="system-ui,sans-serif">${label}</text>`;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6"
    fill="#F7F8FA" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,2"/>
  ${textNodes}`;
}

function makeDoor(x, y, h, label) {

/* =========================================================

function renderCatalog(main) {
  const items = getSortedCatalog();
  const topIds = new Set(items.filter(i => i.recentUse > 0).slice(0, 2).map(i => i.id));

  let html = `<div class="floor-title">Services catalog</div>`;
  html += `<div style="font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.4;">Sorted by usage in the last 30 days. Edit names and prices inline.</div>`;

  items.forEach(item => {
    const isTop = topIds.has(item.id);
    const badge = isTop ? `<span class="pop-badge">POPULAR</span>` : `<span class="spacer"></span>`;
    const hiddenClass = item.hidden ? " hidden-item" : "";
    const hideIcon = item.hidden ? "👁" : "🚫";
    const hideBtnClass = item.hidden ? "hide-btn show-btn" : "hide-btn";
    html += `
      <div class="catalog-row${hiddenClass}" data-id="${item.id}">
        ${badge}
        <input class="svc-label" type="text" value="${(item.name || "").replace(/"/g, "&quot;")}" placeholder="Service name" data-field="name" />
        <div class="price-wrap">
          <span>€</span>
          <input type="number" value="${item.price || 0}" min="0" step="0.01" data-field="price" />
        </div>
        <button class="${hideBtnClass}" data-hidden="${!!item.hidden}">${hideIcon}</button>
      </div>`;
  });

  html += `
    <div class="section-title" style="margin-top:20px;">Add new service</div>
    <div class="add-catalog-row">
      <input type="text" id="newSvcName" placeholder="Service name" />
      <div class="price-wrap"><span>€</span><input type="number" id="newSvcPrice" value="0" min="0" step="0.01" /></div>
      <button id="addSvcBtn">+</button>
    </div>`;

  main.innerHTML = html;

  // Wire up catalog interactions
  main.querySelectorAll(".catalog-row").forEach(row => {
    const id = row.dataset.id;
    row.querySelector("input[data-field='name']").onblur = (e) => updateCatalogItem(id, "name", e.target.value.trim());
    row.querySelector("input[data-field='price']").onblur = (e) => updateCatalogItem(id, "price", parseFloat(e.target.value) || 0);
    row.querySelector(".hide-btn").onclick = () => toggleCatalogHidden(id, row.querySelector(".hide-btn").dataset.hidden === "true");
  });

  main.querySelector("#addSvcBtn").onclick = () => {
    const name = main.querySelector("#newSvcName").value;
    const price = main.querySelector("#newSvcPrice").value;
    if (!name.trim()) return;
    addCatalogItem(name, price);
    main.querySelector("#newSvcName").value = "";
    main.querySelector("#newSvcPrice").value = "0";
  };
}

/* =========================================================
   ROOM PANEL (overlay)
   ========================================================= */
function openRoomPanel(roomId) {
  const info = ROOM_INDEX[roomId];
  if (!info) return;
  const status = getRoomStatus(roomId);
  const displayNum = info.isSuite ? roomId.replace("s", "") : roomId;

  let hkBlock = "";
  const meta = getRoomMeta(roomId);
  const byLine = meta && meta.by ? `<div class="by-line">Marked ready by ${meta.by}${meta.at ? " · " + formatTime(meta.at) : ""}</div>` : "";

  if (isAdmin) {
    // Admin: can set the cleaning type, and Accept when status is "ready"
    const isReady = status === "ready" || status === "ready-refresh" || status === "ready-midweek" || status === "ready-full";
    if (isReady) {
      const readyLabel = status === "ready-refresh" ? "Ready · Refresh"
                       : status === "ready-midweek"  ? "Ready · Midweek"
                       : status === "ready-full"      ? "Ready · Full clean"
                       : "Ready for check";
      const readyClass = status === "ready-refresh" ? "ready-refresh"
                       : status === "ready-midweek"  ? "ready-midweek"
                       : "ready";
      hkBlock = `
        <div class="hk-box ready" style="${status === "ready-refresh" ? "background:#F0FAF3;border:1px solid #B8E0C4;border-left:4px solid #8BC9A0;" : status === "ready-midweek" ? "background:#D6F0DF;border:1px solid #90D4A8;border-left:4px solid #4DA870;" : ""}">
          <div>
            <div class="label">Housekeeping</div>
            <div class="desc">${readyLabel}</div>
            ${byLine}
          </div>
          <button class="pill-btn" id="acceptBtn">Accept</button>
        </div>`;
    } else {
      hkBlock = `
        <div class="hk-box ${status === "refresh" ? "refresh" : status === "midweek" ? "midweek" : status === "full" ? "full" : ""}" style="${status === "none" ? "background:#F7F8FA;border:1px solid var(--border);border-left:4px solid var(--gray-line);" : ""}">
          <div style="flex:1;">
            <div class="label">Housekeeping</div>
            <div class="desc" style="color:var(--muted-2);">${STATUS_LABEL[status]}</div>
            <div class="admin-select-row">
              <select id="cleanSelect">
                <option value="none" ${status === "none" ? "selected" : ""}>No cleaning needed</option>
                <option value="refresh" ${status === "refresh" ? "selected" : ""}>Refresh clean</option>
                <option value="midweek" ${status === "midweek" ? "selected" : ""}>Midweek clean</option>
                <option value="full" ${status === "full" ? "selected" : ""}>Full clean</option>
              </select>
            </div>
          </div>
        </div>`;
    }
  } else {
    // Housemaid: read-only status, only a Done button when cleaning is assigned
    if (status === "refresh" || status === "midweek" || status === "full") {
      hkBlock = `
        <div class="hk-box ${status === "refresh" ? "refresh" : status === "midweek" ? "midweek" : "full"}">
          <div style="width:100%;">
            <div class="label">Housekeeping</div>
            <div class="desc" style="margin-bottom:12px;">${STATUS_LABEL[status]}</div>
            <button class="pill-btn full-width" id="doneBtn">Done — ready for check</button>
          </div>
        </div>
        <div class="clean-note">The room stays marked until you tap Done. No other action needed from you.</div>`;
    } else if (status === "ready" || status === "ready-refresh" || status === "ready-midweek" || status === "ready-full") {
      hkBlock = `
        <div class="hk-box ready">
          <div>
            <div class="label">Housekeeping</div>
            <div class="desc">Already marked ready — waiting for admin check.</div>
            ${byLine}
          </div>
        </div>`;
    } else {
      hkBlock = `
        <div class="clean-card">
          <span class="check-icon">✓</span>
          <span class="text">This room doesn't need cleaning right now.</span>
        </div>`;
    }
  }

  const ex = roomExtras[roomId] || {};
  const isBilled = !!ex.billed;

  // Build extras block (admin only)
  let extrasBlock = "";
  if (isAdmin) {
    const sortedSvc = getSortedCatalog().filter(s => !s.hidden);

    // Only show services that have been added (qty > 0) or are custom
    let rowsHtml = "";

    // Standard services that have been added
    sortedSvc.forEach(svc => {
      const entry = ex[svc.id];
      if (!entry || !entry.qty) return; // skip if not added
      const qty = entry.qty || 0;
      const total = entry.total != null ? entry.total : (qty * svc.price);
      rowsHtml += `
        <div class="extra-row">
          <div>
            <div class="svc-name">${svc.name}</div>
            <div class="svc-unit">from catalog</div>
          </div>
          <input class="qty-input" type="number" min="0" value="${qty}"
            data-svcid="${svc.id}" data-price="${svc.price}" />
          <input class="unit-price-input" type="number" min="0" step="0.01"
            value="${svc.price.toFixed(2)}"
            data-svcid="${svc.id}" />
          <input class="total-input" type="number" min="0" step="0.01"
            value="${total.toFixed(2)}"
            data-svcid="${svc.id}" />
          <button class="del-row-btn" data-svcid="${svc.id}"
            style="width:26px;height:26px;padding:0;background:transparent;border:1px solid #E2E8F0;border-radius:6px;color:var(--muted);font-size:16px;line-height:1;cursor:pointer;">×</button>
        </div>`;
    });

    // Custom items
    Object.keys(ex).forEach(k => {
      if (!k.startsWith("custom_") || !ex[k]) return;
      const c = ex[k];
      const unitPrice = c.unitPrice || 0;
      rowsHtml += `
        <div class="extra-row" style="background:var(--blue-bg);">
          <div>
            <div class="svc-name">${c.name || ""}</div>
            <div class="svc-unit">custom</div>
          </div>
          <input class="qty-input" type="number" min="0" value="${c.qty || 1}"
            data-svcid="${k}" data-price="${unitPrice}" />
          <input class="unit-price-input" type="number" min="0" step="0.01"
            value="${unitPrice > 0 ? unitPrice.toFixed(2) : ""}" placeholder="€"
            data-svcid="${k}" />
          <input class="total-input" type="number" min="0" step="0.01"
            value="${(c.total || 0).toFixed(2)}"
            data-svcid="${k}" />
          <button class="del-row-btn" data-svcid="${k}"
            style="width:26px;height:26px;padding:0;background:transparent;border:1px solid #BCD4EC;border-radius:6px;color:var(--muted);font-size:16px;line-height:1;cursor:pointer;">×</button>
        </div>`;
    });

    const hasAnyExtras = rowsHtml.trim().length > 0;

    // Dropdown options from catalog
    const catalogOptions = sortedSvc
      .map(s => `<option value="${s.id}" data-price="${s.price}">${s.name} (€${s.price.toFixed(2)})</option>`)
      .join("");

    extrasBlock = `
      <div class="section-title">Extra services</div>
      ${hasAnyExtras ? `
      <div class="extras-col-headers">
        <span></span><span>Qty</span><span>€/unit</span><span>Total €</span><span></span>
      </div>
      ${rowsHtml}` : `<div class="billed-note" style="text-align:left;margin-bottom:12px;">No extras added yet.</div>`}

      <div class="section-title">Add service</div>
      <div style="display:flex;gap:6px;margin-bottom:8px;align-items:flex-end;">
        <select id="svcSelect" style="flex:1;font-size:15px;padding:9px 8px;border:1px solid var(--border);border-radius:6px;color:var(--navy);">
          <option value="">— choose from catalog —</option>
          ${catalogOptions}
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px;text-align:center;">Qty</div>
          <input type="number" id="svcQty" min="1" value="1"
            style="width:100%;font-size:15px;padding:9px 4px;border:1px solid var(--border);border-radius:6px;text-align:center;" />
        </div>
        <button id="addSvcFromCatalogBtn"
          style="padding:9px 14px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:500;margin-top:17px;">
          Add
        </button>
      </div>

      <div class="section-title">New custom item</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;">
        <input type="text" id="customName" placeholder="Service name"
          style="font-size:15px;padding:9px 10px;border:1px solid var(--border);border-radius:6px;" />
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;text-align:center;">Qty</div>
            <input type="number" id="customQty" min="1" value="1" placeholder="1"
              style="width:100%;font-size:14px;padding:8px 4px;border:1px solid var(--border);border-radius:6px;text-align:center;" />
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;text-align:center;">€/unit</div>
            <input type="number" id="customUnitPrice" min="0" step="0.01" placeholder="price/unit"
              style="width:100%;font-size:14px;padding:8px 4px;border:1px solid var(--border);border-radius:6px;text-align:right;" />
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;text-align:center;">Total €</div>
            <input type="number" id="customTotal" min="0" step="0.01" placeholder="or enter total"
              style="width:100%;font-size:14px;padding:8px 4px;border:1px solid var(--border);border-radius:6px;text-align:right;" />
          </div>
        </div>
        <button id="addCustomBtn"
          style="width:100%;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:500;">
          + Add
        </button>
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin-top:4px;font-size:13px;color:var(--muted-2);">
        <input type="checkbox" id="saveTocatalog" style="width:16px;height:16px;" />
        Save this to catalog for future use
      </label>`
  }

  const overlay = document.createElement("div");
  overlay.className = "panel-overlay";
  overlay.innerHTML = `
    <div class="panel-header">
      <button class="back-btn" id="panelBack"><span style="font-size:23px;">&larr;</span> Floor plan</button>
      <div class="panel-title">
        <span class="num">${displayNum.padStart(2, "0")}</span>
        <span class="name">${info.name}</span>
      </div>
    </div>
    <div class="panel-body">
      ${hkBlock}
      ${extrasBlock}
    </div>
    ${isAdmin ? `
    <div class="panel-footer">
      <div class="grand-total-row">
        <span class="label">Grand total</span>
        <span class="amount" id="grandTotal">€0.00</span>
      </div>
      <button class="pill-btn full-width" id="billedBtn" style="margin-bottom:8px;">
        Mark as billed
      </button>
      <button class="pill-btn full-width" id="clearBtn" style="background:transparent;border:1px solid var(--border);color:var(--muted-2);font-size:14px;">
        Clear extras list
      </button>
    </div>` : ""}
  `;
  document.getElementById("overlaySlot").appendChild(overlay);

  overlay.querySelector("#panelBack").onclick = () => { overlay.remove(); render(); };

  const acceptBtn = overlay.querySelector("#acceptBtn");
  if (acceptBtn) acceptBtn.onclick = () => { setRoomStatus(roomId, "none"); overlay.remove(); };

  const doneBtn = overlay.querySelector("#doneBtn");
  if (doneBtn) doneBtn.onclick = () => {
    const name = getOrAskStaffName();
    if (!name) return;
    setRoomStatus(roomId, "ready", name, status);
    overlay.remove();
  };

  const cleanSelect = overlay.querySelector("#cleanSelect");
  if (cleanSelect) cleanSelect.onchange = () => { setRoomStatus(roomId, cleanSelect.value); };

  if (isAdmin) {
    // Grand total calculator
    function recalcGrandTotal() {
      let sum = 0;
      overlay.querySelectorAll(".total-input").forEach(inp => {
        sum += parseFloat(inp.value) || 0;
      });
      const gt = overlay.querySelector("#grandTotal");
      if (gt) gt.textContent = "€" + sum.toFixed(2);
    }

    // qty input → auto-fill total = qty × unit_price, then save
    overlay.querySelectorAll(".qty-input").forEach(inp => {
      inp.oninput = () => {
        const svcId = inp.dataset.svcid;
        const unitInp = overlay.querySelector(`.unit-price-input[data-svcid="${svcId}"]`);
        const price = unitInp ? (parseFloat(unitInp.value) || 0) : (parseFloat(inp.dataset.price) || 0);
        const qty = parseInt(inp.value) || 0;
        const totalInp = overlay.querySelector(`.total-input[data-svcid="${svcId}"]`);
        if (price > 0 && totalInp) {
          totalInp.value = qty > 0 ? (qty * price).toFixed(2) : "";
        }
        recalcGrandTotal();
      };
      inp.onchange = () => {
        const svcId = inp.dataset.svcid;
        const qty = parseInt(inp.value) || 0;
        const totalInp = overlay.querySelector(`.total-input[data-svcid="${svcId}"]`);
        const total = parseFloat(totalInp?.value) || 0;
        setExtra(roomId, svcId, { qty, total });
      };
    });

    // total input → save when user changes it manually
    overlay.querySelectorAll(".total-input").forEach(inp => {
      inp.oninput = () => recalcGrandTotal();
      inp.onchange = () => {
        const svcId = inp.dataset.svcid;
        const qtyInp = overlay.querySelector(`.qty-input[data-svcid="${svcId}"]`);
        const qty = parseInt(qtyInp?.value) || 0;
        const total = parseFloat(inp.value) || 0;
        setExtra(roomId, svcId, { qty, total });
      };
    });

    // Run grand total on open
    recalcGrandTotal();

    // Add from catalog
    const addSvcFromCatalogBtn = overlay.querySelector("#addSvcFromCatalogBtn");
    if (addSvcFromCatalogBtn) addSvcFromCatalogBtn.onclick = () => {
      const select = overlay.querySelector("#svcSelect");
      const svcId = select.value;
      if (!svcId) { select.focus(); return; }
      const svc = catalog[svcId];
      if (!svc) return;
      const addQty = parseInt(overlay.querySelector("#svcQty")?.value) || 1;
      const price = svc.price || 0;

      // Accumulate — don't overwrite existing entry
      const existing = (roomExtras[roomId] || {})[svcId] || { qty: 0, total: 0 };
      const newQty = (existing.qty || 0) + addQty;
      const newTotal = newQty * price; // recalc from unit price
      setExtra(roomId, svcId, { qty: newQty, total: newTotal });
      if (!roomExtras[roomId]) roomExtras[roomId] = {};
      roomExtras[roomId][svcId] = { qty: newQty, total: newTotal };
      renderMain();
      overlay.remove();
      openRoomPanel(roomId);
    };

    // Custom item with optional save to catalog
    const addCustomBtn = overlay.querySelector("#addCustomBtn");
    if (addCustomBtn) {
      // Auto-calc total when qty or unit price changes
      const customQtyInp = overlay.querySelector("#customQty");
      const customUnitInp = overlay.querySelector("#customUnitPrice");
      const customTotalInp = overlay.querySelector("#customTotal");

      function recalcCustomTotal() {
        const q = parseFloat(customQtyInp.value) || 0;
        const u = parseFloat(customUnitInp.value) || 0;
        if (q > 0 && u > 0) {
          customTotalInp.value = (q * u).toFixed(2);
        }
      }
      customQtyInp.oninput = recalcCustomTotal;
      customUnitInp.oninput = recalcCustomTotal;
      // Also recalc when user leaves qty field after entering unit price
      customQtyInp.onchange = recalcCustomTotal;
      customUnitInp.onchange = recalcCustomTotal;

      addCustomBtn.onclick = () => {
        const nameInp = overlay.querySelector("#customName");
        const saveCb = overlay.querySelector("#saveTocatalog");
        const name = nameInp.value.trim();
        const qty = parseInt(customQtyInp.value) || 1;
        const unitPrice = parseFloat(customUnitInp.value) || 0;
        const total = parseFloat(customTotalInp.value) || (qty * unitPrice) || 0;
        if (!name) { nameInp.focus(); return; }

        if (saveCb && saveCb.checked) {
          // Save to catalog (price per unit) and add as standard service
          const newId = "svc_" + Date.now();
          db.ref("catalog/" + newId).set({ name, price: unitPrice || (total / qty) || total, hidden: false });
          catalog[newId] = { name, price: unitPrice || (total / qty) || total, hidden: false };
          setExtra(roomId, newId, { qty, total });
          if (!roomExtras[roomId]) roomExtras[roomId] = {};
          roomExtras[roomId][newId] = { qty, total };
          renderMain();
        } else {
          // Add as one-off custom
          const customKey = "custom_" + Date.now();
          setExtra(roomId, customKey, { name, qty, unitPrice, total });
          if (!roomExtras[roomId]) roomExtras[roomId] = {};
          roomExtras[roomId][customKey] = { name, qty, unitPrice, total };
        }
        renderMain();
        overlay.remove();
        openRoomPanel(roomId);
      };
    }

    // unit price change → recalc total = qty × new price
    overlay.querySelectorAll(".unit-price-input").forEach(inp => {
      inp.oninput = () => {
        const svcId = inp.dataset.svcid;
        const price = parseFloat(inp.value) || 0;
        const qtyInp = overlay.querySelector(`.qty-input[data-svcid="${svcId}"]`);
        const qty = parseInt(qtyInp?.value) || 0;
        const totalInp = overlay.querySelector(`.total-input[data-svcid="${svcId}"]`);
        if (totalInp && qty > 0) totalInp.value = (qty * price).toFixed(2);
        recalcGrandTotal();
      };
      inp.onchange = () => {
        const svcId = inp.dataset.svcid;
        const price = parseFloat(inp.value) || 0;
        const qtyInp = overlay.querySelector(`.qty-input[data-svcid="${svcId}"]`);
        if (qtyInp) qtyInp.dataset.price = price;
        const qty = parseInt(qtyInp?.value) || 0;
        const totalInp = overlay.querySelector(`.total-input[data-svcid="${svcId}"]`);
        const total = parseFloat(totalInp?.value) || 0;
        // preserve name for custom items
        const existing = (roomExtras[roomId] || {})[svcId] || {};
        const saveData = existing.name
          ? { name: existing.name, qty, unitPrice: price, total }
          : { qty, total };
        setExtra(roomId, svcId, saveData);
        if (roomExtras[roomId] && roomExtras[roomId][svcId]) {
          Object.assign(roomExtras[roomId][svcId], { unitPrice: price, total });
        }
      };
    });

    // Delete individual extra row
    overlay.querySelectorAll(".del-row-btn").forEach(btn => {
      btn.onclick = () => {
        const svcId = btn.dataset.svcid;
        // Remove from Firebase
        if (db) db.ref("extras/" + roomId + "/" + svcId).remove();
        // Remove from local state
        if (roomExtras[roomId]) delete roomExtras[roomId][svcId];
        renderMain();
        overlay.remove();
        openRoomPanel(roomId);
      };
    });

    // Mark as billed
    const billedBtn = overlay.querySelector("#billedBtn");
    if (billedBtn) billedBtn.onclick = () => {
      markBilled(roomId);
      overlay.remove();
    };

    // Clear extras list — wipe all extras for this room, start fresh
    const clearBtn = overlay.querySelector("#clearBtn");
    if (clearBtn) clearBtn.onclick = () => {
      if (!confirm("Clear all extras for this room? This cannot be undone.")) return;
      resetExtras(roomId);
      if (roomExtras[roomId]) delete roomExtras[roomId];
      overlay.remove();
      openRoomPanel(roomId);
    };
  }
}

/* =========================================================
   ADMIN PIN FLOW
   ========================================================= */
function showPinModal() {
  const overlay = document.createElement("div");
  overlay.className = "pin-overlay";
  overlay.innerHTML = `
    <div class="pin-card">
      <h3>Admin mode</h3>
      <p>Enter the PIN to access pricing and billing controls.</p>
      <input type="password" inputmode="numeric" maxlength="4" class="pin-input" id="pinInput" autofocus />
      <div class="pin-error" id="pinError"></div>
      <div class="pin-actions">
        <button class="cancel" id="pinCancel">Cancel</button>
        <button class="confirm" id="pinConfirm">Unlock</button>
      </div>
    </div>
  `;
  document.getElementById("overlaySlot").appendChild(overlay);

  const input = overlay.querySelector("#pinInput");
  const error = overlay.querySelector("#pinError");

  overlay.querySelector("#pinCancel").onclick = () => overlay.remove();
  overlay.querySelector("#pinConfirm").onclick = tryUnlock;
  input.onkeydown = (e) => { if (e.key === "Enter") tryUnlock(); };

  function tryUnlock() {
    if (input.value === ADMIN_PIN) {
      isAdmin = true;
      sessionStorage.setItem("isAdmin", "1");
      overlay.remove();
      render();
    } else {
      error.textContent = "Incorrect PIN, try again.";
      input.value = "";
    }
  }
}

document.getElementById("switchRoleBtn").onclick = () => {
  if (isAdmin) {
    isAdmin = false;
    sessionStorage.removeItem("isAdmin");
    render();
  } else {
    showPinModal();
  }
};

// Restore admin session within the same tab (cleared on close/reload).
if (sessionStorage.getItem("isAdmin") === "1") {
  isAdmin = true;
}

/* =========================================================
   MASTER RENDER
   ========================================================= */
function render() {
  document.getElementById("rolePill").textContent = isAdmin ? "Admin mode" : "Staff view";
  document.getElementById("rolePill").className = "role-pill" + (isAdmin ? " admin" : "");
  document.getElementById("switchRoleBtn").textContent = isAdmin ? "Switch to staff view" : "Switch to admin mode";
  renderTabs();
  renderReadyBanner();
  renderMain();
}

render();
</script>

</body>
</html>
